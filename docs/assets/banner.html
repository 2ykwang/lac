<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>lac — banner B (light / diagram)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1280px; height: 640px;
    overflow: hidden;
  }
  body {
    background: #fafafa;
    color: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px;
  }
  .title {
    font-size: 80px;
    font-weight: 700;
    letter-spacing: -0.04em;
    margin-bottom: 24px;
    line-height: 1;
  }
  .tagline {
    font-size: 20px;
    color: #555;
    text-align: center;
    max-width: 820px;
    line-height: 1.6;
    margin-bottom: 72px;
  }
  .diagram {
    display: flex;
    align-items: center;
    gap: 40px;
    font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
  }
  .node {
    border: 2px solid #1a1a1a;
    padding: 24px 32px;
    border-radius: 8px;
    background: white;
    text-align: center;
    min-width: 240px;
  }
  .node .path {
    font-size: 18px;
    color: #1a1a1a;
  }
  .node .label {
    color: #888;
    font-size: 13px;
    margin-top: 8px;
    letter-spacing: 0.02em;
  }
  .arrow {
    font-size: 32px;
    color: #1a1a1a;
    letter-spacing: -0.04em;
  }
</style>
</head>
<body>
  <div class="title">lac</div>
  <div class="tagline">
    A CLI for managing AI agent config files<br>
    without committing them to the repo.
  </div>
  <div class="diagram">
    <div class="node">
      <div class="path">~/repo/CLAUDE.md</div>
      <div class="label">symlink</div>
    </div>
    <div class="arrow">──&gt;</div>
    <div class="node">
      <div class="path">~/.local/share/lac/&lt;repo&gt;/CLAUDE.md</div>
      <div class="label">actual file</div>
    </div>
  </div>
</body>
</html>
